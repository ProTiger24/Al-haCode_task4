<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Reservation System</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- Navigation -->
        <nav class="navbar">
            <div class="container">
                <div class="nav-brand">
                    <i class="fas fa-hotel"></i>
                    <span>Hotel Booking</span>
                </div>
                <div class="nav-links">
                    <a href="#" class="active" data-page="home"><i class="fas fa-home"></i> Home</a>
                    <a href="#" data-page="bookings"><i class="fas fa-list"></i> My Bookings</a>
                    <span id="userEmailDisplay" style="color:rgba(255,255,255,0.8);font-size:13px;margin-left:15px;background:rgba(255,255,255,0.15);padding:5px 12px;border-radius:20px;"></span>
                </div>
            </div>
        </nav>

        <!-- Hero Section -->
        <section class="hero">
            <div class="container">
                <div class="hero-content">
                    <h1>Find Your Perfect Stay</h1>
                    <p>Book luxury rooms at the best prices</p>
                    <div class="search-box">
                        <div class="search-group">
                            <i class="fas fa-calendar-alt"></i>
                            <input type="date" id="checkIn">
                        </div>
                        <div class="search-group">
                            <i class="fas fa-calendar-alt"></i>
                            <input type="date" id="checkOut">
                        </div>
                        <div class="search-group">
                            <i class="fas fa-users"></i>
                            <input type="number" id="guests" value="2" min="1" max="10">
                        </div>
                        <button onclick="searchRooms()" class="btn-search">
                            <i class="fas fa-search"></i> Search
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <!-- Loading -->
        <div id="loading" style="display:none; text-align:center; padding:40px;">
            <i class="fas fa-spinner fa-spin" style="font-size:48px; color:#667eea;"></i>
            <p style="margin-top:10px;">Loading rooms...</p>
        </div>

        <!-- Rooms -->
        <section class="rooms-section">
            <div class="container">
                <h2 class="section-title"><i class="fas fa-bed"></i> Available Rooms</h2>
                <div id="roomList" class="room-grid"></div>
            </div>
        </section>

        <!-- Booking Modal -->
        <div id="bookingModal" class="modal" style="display:none;">
            <div class="modal-content">
                <span class="close" onclick="closeModal()">&times;</span>
                <h2><i class="fas fa-edit"></i> Complete Booking</h2>
                <div id="bookingDetails"></div>
                
                <div class="payment-section">
                    <h3><i class="fas fa-credit-card"></i> Payment</h3>
                    <div class="payment-methods">
                        <div class="payment-option" onclick="selectPayment('BKASH')">
                            <i class="fas fa-mobile-alt"></i> bKash
                        </div>
                        <div class="payment-option" onclick="selectPayment('CARD')">
                            <i class="fas fa-credit-card"></i> Card
                        </div>
                        <div class="payment-option" onclick="selectPayment('BANK')">
                            <i class="fas fa-university"></i> Bank
                        </div>
                    </div>
                    <div id="paymentForm" class="payment-form"></div>
                    <button onclick="processPayment()" class="btn-confirm" id="payBtn">
                        <i class="fas fa-check"></i> Confirm & Pay
                    </button>
                </div>
            </div>
        </div>

        <!-- Bookings -->
        <section class="bookings-section" id="bookingsSection" style="display:none;">
            <div class="container">
                <h2 class="section-title"><i class="fas fa-list"></i> My Bookings</h2>
                <div id="bookingList" class="booking-list"></div>
            </div>
        </section>
    </div>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/payment.js"></script>
</body>
</html>
